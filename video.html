<!DOCTYPE html>
<html lang="ms" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akademi Multimedia - Ilmu Emas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @keyframes video-highlight {
    0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
    25%  { box-shadow: 0 0 0 4px rgba(251,191,36,0.35), 0 8px 32px rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.8); }
    50%  { box-shadow: 0 0 0 2px rgba(251,191,36,0.15), 0 4px 16px rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.4); }
    75%  { box-shadow: 0 0 0 4px rgba(251,191,36,0.25), 0 8px 24px rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.6); }
    100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
  }
  .video-highlight-anim {
    animation: video-highlight 1.6s ease 3;
  }
  /* Sembunyikan scrollbar untuk kategori */
  .scrollbar-none::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-none {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* ── Coffee Cup Animation ── */
  .coffee-cup-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 44px;
  }
  .coffee-cup-wrap svg {
    width: 26px;
    height: 26px;
    position: absolute;
    bottom: 9px;
  }
  .steam {
    stroke: #fbbf24;
    stroke-width: 2;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
    animation: steam-svg 1.8s ease-in-out infinite;
  }
  .steam-1 { animation-delay: 0s; }
  .steam-2 { animation-delay: 0.5s; }
  @keyframes steam-svg {
    0%   { opacity: 0; transform: translateY(0px); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-7px); }
  }
  .coffee-cup-wrap svg path:not(.steam) {
    fill: #fbbf24;
    stroke: #fbbf24;
  }
</style>
</head>
<body class="min-h-screen pb-12 bg-zinc-950 max-w-md mx-auto border-x border-zinc-900/40">
  
  <header class="p-4 border-b border-zinc-900 flex items-center justify-between sticky top-0 bg-zinc-950/80 backdrop-blur-md z-40">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-zinc-400 hover:text-amber-400"><i class="fa-solid fa-arrow-left text-lg"></i></a>
      <h1 class="text-base font-bold">Akademi Multimedia</h1>
    </div>
    <div class="coffee-cup-wrap">
      <svg viewBox="0 0 24 24">
        <path class="steam steam-1" d="M10,4 C10,2 11,2 11,0" />
        <path class="steam steam-2" d="M14,4 C14,2 13,2 13,0" />
        <path d="M2,21 C2,22 3,23 4,23 L16,23 C17,23 18,22 18,21 L18,11 L2,11 L2,21 Z M18,13 L20,13 C21,13 22,14 22,15 L22,17 C22,18 21,19 20,19 L18,19 L18,13 Z" />
      </svg>
    </div>
  </header>

  <main class="p-4 space-y-6">
    <div id="video-filter-bar" class="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
      </div>

    <div id="video-container" class="space-y-6"></div>
  </main>

  <script src="js/video-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentVideoFilter = "all";

    // Janakan senarai kategori dinamik merujuk kepada video-data.js
    const videoCategories = ["all", ...new Set(VIDEO_DATA.map(v => v.category))];

    function buildVideoFilterBar() {
      const bar = document.getElementById("video-filter-bar");
      bar.innerHTML = "";

      videoCategories.forEach(cat => {
        // Abaikan kategori eksklusif di bar filter paparan awam jika perlu
        if(cat === "kisah-kejayaan") return;

        const btn = document.createElement("button");
        
        // Pemformatan nama label yang cantik & premium
        if(cat === "all") {
          btn.innerText = "Semua";
        } else {
          btn.innerText = cat.split("-").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
        }

        if(cat === currentVideoFilter) {
          btn.className = "bg-amber-400 text-zinc-950 text-xs px-4 py-2 rounded-full font-bold shadow-sm whitespace-nowrap transition-all";
        } else {
          btn.className = "bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-4 py-2 rounded-full font-medium border border-zinc-800 whitespace-nowrap transition-all";
        }

        btn.onclick = () => {
          currentVideoFilter = cat;
          buildVideoFilterBar();
          renderVideos(cat);
        };

        bar.appendChild(btn);
      });
    }

    function renderVideos(filter) {
      const container = document.getElementById("video-container");
      container.innerHTML = "";
      
      const filtered = VIDEO_DATA.filter(v => filter === "all" || v.category === filter);
      
      filtered.forEach(video => {
        if(video.category === "kisah-kejayaan") return;

        const card = document.createElement("div");
        card.className = "bg-zinc-900 border border-zinc-800/80 rounded-2xl p-4 space-y-3 shadow-md";
        card.id = video.id;
        card.innerHTML = `
          <div class="overflow-hidden rounded-xl bg-zinc-950">
            ${video.embedCode}
          </div>
          <div class="flex flex-col space-y-2">
            <span class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">${video.category.replace("-", " ")}</span>
            <h3 class="text-sm font-bold leading-snug text-zinc-100">${video.title}</h3>
            <div class="flex justify-end pt-1">
              <button onclick="copyGlobalLink('video.html#${video.id}')" class="text-xs text-zinc-400 hover:text-amber-400 flex items-center gap-1.5 font-medium bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800">
                <i class="fa-solid fa-copy"></i> Kongsi
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Init run
    buildVideoFilterBar();
    renderVideos("all");

    // Auto scroll + highlight jika ada URL hash
    window.addEventListener("DOMContentLoaded", function () {
      const hash = window.location.hash;
      if (!hash) return;

      const targetId = hash.replace("#", "");
      const linkedVideo = VIDEO_DATA.find(v => v.id === targetId);

      if(linkedVideo) {
        // Auto tukar tab kategori video jika dipanggil dari luar
        if(currentVideoFilter !== "all" && currentVideoFilter !== linkedVideo.category) {
          currentVideoFilter = linkedVideo.category;
          buildVideoFilterBar();
          renderVideos(linkedVideo.category);
        }

        setTimeout(function () {
          const target = document.getElementById(targetId);
          if (!target) return;

          target.scrollIntoView({ behavior: "smooth", block: "center" });

          setTimeout(function () {
            target.classList.add("video-highlight-anim");
            target.addEventListener("animationend", function () {
              target.classList.remove("video-highlight-anim");
            }, { once: true });
          }, 600);
        }, 300);
      }
    });
  </script>
</body>
</html>
