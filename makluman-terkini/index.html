<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkib Makluman Terkini - Gold Saver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        
        /* Custom Scrollbar Premium Fintech */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-gray-400 min-h-screen">

    <nav class="sticky top-0 z-50 bg-zinc-900/90 backdrop-blur-md border-b border-zinc-800 px-4 py-3 flex items-center justify-between">
        <a href="../index.html" class="text-amber-400 font-black text-xl tracking-wider uppercase flex items-center gap-2">
            <i class="fa-solid fa-chevron-left text-sm text-gray-400"></i> Ilmu Emas
        </a>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 md:max-w-xl pb-16">
        <header class="mb-8">
            <h1 class="text-2xl font-extrabold text-white">Log Makluman Terkini</h1>
            <p class="text-xs text-gray-500 mt-1">Info terbaru dan makluman terkini.</p>
        </header>

        <div class="space-y-4" id="makluman-container">
            </div>
    </main>

    <script src="js/program-data.js"></script>
    
    <script>
        let countdownInterval;

        // FUNGSI UTAMA: MENGIRA UNDURAN MASA SECARA REAL-TIME DENGAN FORMAT FINTECH PREMIUM
        function getCountdownString(targetDateStr) {
            if (!targetDateStr) return "<span class='text-zinc-600'><i class='fa-regular fa-clock mr-1'></i>Masa Tiada</span>";
            
            const targetTime = new Date(targetDateStr).getTime();
            const now = new Date().getTime();
            const difference = targetTime - now;

            // Jika masa program sudah berlalu
            if (difference <= 0) {
                // Selesai dalam tempoh 3 jam dianggap masih LIVE sekarang
                if (difference > -10800000) { 
                    return "<span class='text-emerald-400 inline-flex items-center gap-1 bg-emerald-400/5 px-2 py-0.5 rounded border border-emerald-400/10 text-[10px]'><span class='w-1 h-1 rounded-full bg-emerald-400 animate-pulse'></span> LIVE SEKARANG</span>";
                }
                return "<span class='text-zinc-500 bg-zinc-900 px-2 py-0.5 rounded border border-zinc-800/80 text-[10px] uppercase font-medium tracking-wider'>Selesai</span>";
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            let countdownText = "";
            if (days > 0) countdownText += `${days}h `;
            countdownText += `${hours.toString().padStart(2, '0')}j ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;

            return `<span class="text-amber-400/90 font-mono text-[11px] font-semibold bg-amber-400/5 px-2 py-0.5 rounded border border-amber-400/10 inline-flex items-center gap-1"><i class="fa-regular fa-clock text-[9px]"></i> Mula: ${countdownText}</span>`;
        }

        // FUNGSI UTAMA: MENJANA PAPARAN KAD BERPANDUKAN DATA PROGRAM-DATA.JS
        function renderMaklumanCards() {
            const container = document.getElementById('makluman-container');
            if (!container) return;
            
            container.innerHTML = '';

            // Semak sekiranya data tersedia
            if (typeof programData === 'undefined' || programData.length === 0) {
                container.innerHTML = `<p class="text-xs text-zinc-600 text-center py-8">Tiada makluman terkini buat masa ini.</p>`;
                return;
            }

            programData.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 shadow-xl backdrop-blur-sm hover:border-zinc-700/80 transition-all duration-300 flex flex-col justify-between";
                
                // Ambil nilai pengiraan masa terkini
                const countdownHTML = getCountdownString(item.date);

                card.innerHTML = `
                    <div>
                        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-2 mb-2">
                            <h3 class="text-sm font-bold text-white leading-snug">${item.title}</h3>
                            <div class="card-countdown-ticker shrink-0" data-date="${item.date || ''}">
                                ${countdownHTML}
                            </div>
                        </div>
                        <p class="text-xs text-zinc-500 leading-relaxed text-justify">
                            ${item.caption}
                        </p>
                    </div>
                    
                    <div class="mt-4 pt-3 border-t border-zinc-800/60 flex justify-end">
                        <a href="${item.link || '#'}" target="_blank" class="inline-flex items-center gap-1.5 text-[11px] font-bold text-amber-400 bg-amber-400/10 hover:bg-amber-400 hover:text-zinc-950 px-3 py-1.5 rounded-lg transition-all duration-200 group">
                            Lihat 
                            <i class="fa-solid fa-arrow-up-right-from-square text-[9px] opacity-80 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ENGINE LIVE REFRESH UNTUK DETIK COUNTDOWN SETIAP SAAT SECARA BERTERUSAN
        function startLiveCountdowns() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                document.querySelectorAll('.card-countdown-ticker').forEach(el => {
                    const targetDate = el.getAttribute('data-date');
                    if (targetDate) {
                        el.innerHTML = getCountdownString(targetDate);
                    }
                });
            }, 1000);
        }

        // Jalankan semua modul sebaik sahaja struktur halaman siap dimuatkan
        window.addEventListener('DOMContentLoaded', () => {
            renderMaklumanCards();
            startLiveCountdowns();
        });
    </script>
</body>
</html>
