<style>
  @keyframes video-highlight {
    0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
    25%  { box-shadow: 0 0 0 6px rgba(251,191,36,0.45), 0 8px 32px rgba(251,191,36,0.20); border-color: rgba(251,191,36,1); }
    50%  { box-shadow: 0 0 0 2px rgba(251,191,36,0.15), 0 4px 16px rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.4); }
    75%  { box-shadow: 0 0 0 5px rgba(251,191,36,0.35), 0 8px 24px rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.8); }
    100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
  }
  .video-highlight-anim {
    animation: video-highlight 1.8s ease 3;
    scroll-margin-top: 120px;
  }
  .scrollbar-none::-webkit-scrollbar { display: none; }
  .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

  .coffee-cup-wrap {
    position: relative; display: flex;
    align-items: center; justify-content: center;
    width: 36px; height: 44px;
  }
  .coffee-cup-wrap svg { width: 26px; height: 26px; position: absolute; bottom: 9px; }
  .steam {
    stroke: #fbbf24; stroke-width: 2;
    stroke-linecap: round; fill: none;
    opacity: 0; animation: steam-svg 1.8s ease-in-out infinite;
  }
  .steam-1 { animation-delay: 0s; }
  .steam-2 { animation-delay: 0.5s; }
  @keyframes steam-svg {
    0%   { opacity: 0; transform: translateY(0px); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-7px); }
  }
  #coffee-dropdown { transition: opacity 0.2s ease, transform 0.2s ease; }
  #coffee-dropdown.show { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }
</style>

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentVideoFilter = "all";
let currentTypeFilter  = "all";

// ─── UTILS ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.classList.remove("opacity-0");
  t.classList.add("opacity-100");
  setTimeout(() => {
    t.classList.remove("opacity-100");
    t.classList.add("opacity-0");
  }, 2200);
}

function copyGlobalLink(path) {
  const url = "https://ilmu-emas.pages.dev/" + path;
  navigator.clipboard.writeText(url).then(() => showToast("Link disalin!")).catch(() => {
    // fallback
    const el = document.createElement("textarea");
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    showToast("Link disalin!");
  });
}

// ─── COFFEE MENU ──────────────────────────────────────────────────────────────
function toggleCoffeeMenu() {
  document.getElementById("coffee-dropdown").classList.toggle("show");
}

function triggerDaftarPopup() {
  document.getElementById("coffee-dropdown").classList.remove("show");
  const modal = document.getElementById("daftar-pilihan-modal");
  modal.classList.remove("hidden");
  void modal.offsetWidth;
  modal.classList.remove("opacity-0");
}

function closeDaftarPopup() {
  const modal = document.getElementById("daftar-pilihan-modal");
  modal.classList.add("opacity-0");
  setTimeout(() => modal.classList.add("hidden"), 300);
}

window.addEventListener("click", (e) => {
  const btn = document.getElementById("coffee-btn");
  const dd  = document.getElementById("coffee-dropdown");
  if (btn && dd && !btn.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove("show");
  }
});

// ─── FILTER BARS ──────────────────────────────────────────────────────────────
const videoCategories = ["all", ...new Set(KISAH_KEJAYAAN_DATA.map(v => v.category))];

function buildVideoFilterBar() {
  const bar = document.getElementById("video-filter-bar");
  bar.innerHTML = "";
  videoCategories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat === "all" ? "Semua Kisah"
      : cat.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
    btn.className = cat === currentVideoFilter
      ? "bg-amber-400 text-zinc-950 text-xs px-3.5 py-1.5 rounded-full font-bold shadow-sm whitespace-nowrap transition-all"
      : "bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-3.5 py-1.5 rounded-full font-medium border border-zinc-800/60 whitespace-nowrap transition-all";
    btn.onclick = () => { currentVideoFilter = cat; buildVideoFilterBar(); renderVideos(); };
    bar.appendChild(btn);
  });
}

function buildTypeFilterBar() {
  const bar = document.getElementById("type-filter-bar");
  bar.innerHTML = "";
  const types = [
    { id: "all",      label: "Semua Format",          icon: "fa-border-all" },
    { id: "menegak",  label: "Menegak (TikTok/Reels)",icon: "fa-mobile-screen-button" },
    { id: "lurus",    label: "Lurus (YouTube Video)",  icon: "fa-desktop" }
  ];
  types.forEach(type => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid ${type.icon} mr-1.5 opacity-80 text-[10px]"></i>${type.label}`;
    btn.className = type.id === currentTypeFilter
      ? "bg-amber-400 text-zinc-950 text-xs px-3.5 py-1.5 rounded-full font-bold shadow-sm whitespace-nowrap transition-all"
      : "bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-3.5 py-1.5 rounded-full font-medium border border-zinc-800/60 whitespace-nowrap transition-all";
    btn.onclick = () => { currentTypeFilter = type.id; buildTypeFilterBar(); renderVideos(); };
    bar.appendChild(btn);
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderVideos() {
  const container = document.getElementById("video-container");
  container.innerHTML = "";

  const filtered = KISAH_KEJAYAAN_DATA.filter(v => {
    const matchCat = currentVideoFilter === "all" || v.category === currentVideoFilter;
    let matchType  = true;
    if (currentTypeFilter === "menegak") {
      matchType = v.embedCode.includes("tiktok.com") || v.embedCode.includes("/shorts/");
    } else if (currentTypeFilter === "lurus") {
      matchType = v.embedCode.includes("youtube.com/embed") && !v.embedCode.includes("/shorts/");
    }
    return matchCat && matchType;
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="text-center py-12 text-zinc-500 space-y-2">
        <i class="fa-solid fa-video-slash text-2xl text-zinc-700"></i>
        <p class="text-xs">Tiada video ditemui untuk padanan paparan ini.</p>
      </div>`;
    return;
  }

  filtered.forEach(video => {
    const card = document.createElement("div");
    card.className = "bg-zinc-900 border border-zinc-800/80 rounded-2xl p-4 space-y-3 shadow-md";
    card.id = video.id;
    card.innerHTML = `
      <div class="overflow-hidden rounded-xl bg-zinc-950">${video.embedCode}</div>
      <div class="flex flex-col space-y-2">
        <span class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">${video.category.replace(/-/g, " ")}</span>
        <h3 class="text-sm font-bold leading-snug text-zinc-100">${video.title}</h3>
        <div class="flex justify-end pt-1">
          <button onclick="copyGlobalLink('Kisah-Kejayaan.html#${video.id}')"
            class="text-xs text-zinc-400 hover:text-amber-400 flex items-center gap-1.5 font-medium bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800 transition-colors">
            <i class="fa-solid fa-copy"></i> Kongsi
          </button>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

// ─── HASH SCROLL + BLINK ──────────────────────────────────────────────────────
function handleHashScroll() {
  const hash = window.location.hash;
  if (!hash) return;

  const targetId    = hash.replace("#", "");
  const linkedVideo = KISAH_KEJAYAAN_DATA.find(v => v.id === targetId);
  if (!linkedVideo) return;

  // Pastikan filter sesuai supaya kad muncul
  if (currentVideoFilter !== "all" && currentVideoFilter !== linkedVideo.category) {
    currentVideoFilter = linkedVideo.category;
    buildVideoFilterBar();
  }
  currentTypeFilter = "all";
  buildTypeFilterBar();
  renderVideos();

  // Tunggu DOM render selesai, kemudian scroll & blink
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const target = document.getElementById(targetId);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(() => {
        target.classList.add("video-highlight-anim");
        target.addEventListener("animationend", () => {
          target.classList.remove("video-highlight-anim");
        }, { once: true });
      }, 700);
    });
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildVideoFilterBar();
buildTypeFilterBar();
renderVideos();

// Jalankan hash scroll selepas semua render selesai
window.addEventListener("load", handleHashScroll);
</script>
