<!DOCTYPE html>
<html lang="ms" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akademi Multimedia - Kisah Kejayaan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @keyframes video-highlight {
    0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
    25%  { box-shadow: 0 0 0 4px rgba(251,191,36,0.35), 0 8px 32px rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.8); }
    50%  { box-shadow: 0 0 0 2px rgba(251,191,36,0.15), 0 4px 16px rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.4); }
    75%  { box-shadow: 0 0 0 4px rgba(251,191,36,0.25), 0 8px 24px rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.6); }
    100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.8); }
  }
  .video-highlight-anim {
    animation: video-highlight 1.6s ease 3;
    scroll-margin-top: 140px;
  }
  /* Sembunyikan scrollbar untuk kategori */
  .scrollbar-none::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-none {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* ── Coffee Cup Animation ── */
  .coffee-cup-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 44px;
  }
  .coffee-cup-wrap svg {
    width: 26px;
    height: 26px;
    position: absolute;
    bottom: 9px;
  }
  .steam {
    stroke: #fbbf24;
    stroke-width: 2;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
    animation: steam-svg 1.8s ease-in-out infinite;
  }
  .steam-1 { animation-delay: 0s; }
  .steam-2 { animation-delay: 0.5s; }
  @keyframes steam-svg {
    0%   { opacity: 0; transform: translateY(0px); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-7px); }
  }

  /* Dropdown Transition */
  #coffee-dropdown {
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #coffee-dropdown.show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
  }
</style>
</head>
<body class="min-h-screen pb-12 bg-zinc-950 max-w-md mx-auto border-x border-zinc-900/40">
  
  <header class="p-4 border-b border-zinc-900 flex items-center justify-between sticky top-0 bg-zinc-950/80 backdrop-blur-md z-40">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-zinc-400 hover:text-amber-400"><i class="fa-solid fa-arrow-left text-lg"></i></a>
      <h1 class="text-base font-bold">Kisah Kejayaan</h1>
    </div>
    
    <div class="relative">
      <button onclick="toggleCoffeeMenu()" id="coffee-btn"
        class="flex items-center justify-center text-amber-400 focus:outline-none transition-colors hover:text-yellow-300"
        style="background:none; border:none; padding:0;">
        <div class="coffee-cup-wrap">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="steam steam-1" d="M9 4C9 4 7.5 5.5 9 7C10.5 8.5 9 10 9 10" />
            <path class="steam steam-2" d="M13 3C13 3 11.5 4.5 13 6C14.5 7.5 13 9 13 9" />
            <path d="M18 10H4C2.89543 10 2 10.8954 2 12V15C2 18.3137 4.68629 21 8 21H14C17.3137 21 20 18.3137 20 15V12C20 10.8954 19.1046 10 18 10Z" fill="#fbbf24" />
            <path d="M20 12C20 12 22 12 22 14.5C22 17 20 17 20 17" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none" />
          </svg>
        </div>
      </button>

      <div id="coffee-dropdown"
        class="absolute right-0 mt-3 w-52 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 hidden opacity-0 -translate-y-2 shadow-2xl z-50">

        <button onclick="triggerDaftarPopup()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors text-left">
          <i class="fa-solid fa-user-plus text-amber-400"></i>
          <span>Daftar Percuma</span>
        </button>

        <a href="https://pgdealer-wanhasbullah.pages.dev/chat-assist-faq" target="_blank"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">
          <i class="fa-solid fa-comments text-amber-400"></i>
          <span>Pertanyaan</span>
        </a>
      </div>
    </div>
  </header>

  <main class="p-4 space-y-6">
    <div class="space-y-3 bg-zinc-900/30 p-3 rounded-2xl border border-zinc-900/60 backdrop-blur-sm">
      <div>
        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 px-1">Topik Utama</p>
        <div id="video-filter-bar" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none"></div>
      </div>
      
      <div class="border-t border-zinc-900/80 my-1"></div>

      <div>
        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 px-1">Format Paparan</p>
        <div id="type-filter-bar" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none"></div>
      </div>
    </div>

    <div id="video-container" class="space-y-6"></div>
  </main>

  <div id="daftar-pilihan-modal" class="fixed inset-0 z-50 bg-zinc-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden opacity-0 transition-all duration-300">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm text-center space-y-4">
      <h4 class="font-bold text-lg text-white">Kategori Pendaftaran Akaun</h4>
      <p class="text-xs text-zinc-400">Pilih kategori umur pemohon di bawah:</p>
      <div class="space-y-3 pt-2">
        <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-adult" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-sm rounded-xl transition-all">Dewasa (18 Tahun Ke Atas)</a>
        <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-junior" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-sm rounded-xl transition-all">Junior (17 Tahun Ke Bawah)</a>
      </div>
      <button onclick="closeDaftarPopup()" class="text-xs text-zinc-500 hover:text-zinc-300 pt-2 block mx-auto underline">Tutup</button>
    </div>
  </div>

  <script src="js/video-kisah-kejayaan.js"></script>
  <script src="js/main.js"></script>
  <script>
    function toggleCoffeeMenu() {
      const dropdown = document.getElementById("coffee-dropdown");
      dropdown.classList.toggle("show");
    }

    function triggerDaftarPopup() {
      const dropdown = document.getElementById("coffee-dropdown");
      if (dropdown) dropdown.classList.remove("show");

      const modal = document.getElementById("daftar-pilihan-modal");
      modal.classList.remove("hidden");
      void modal.offsetWidth; 
      modal.classList.remove("opacity-0");
    }

    function closeDaftarPopup() {
      const modal = document.getElementById("daftar-pilihan-modal");
      modal.classList.add("opacity-0");
      setTimeout(() => {
        modal.classList.add("hidden");
      }, 300);
    }

    window.addEventListener("click", (e) => {
      const btn = document.getElementById("coffee-btn");
      const dropdown = document.getElementById("coffee-dropdown");
      if (btn && dropdown && !btn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove("show");
      }
    });

    let currentVideoFilter = "all";
    let currentTypeFilter = "all"; 
    
    // Mengambil kategori daripada KISAH_KEJAYAAN_DATA
    const videoCategories = ["all", ...new Set(KISAH_KEJAYAAN_DATA.map(v => v.category))];

    function buildVideoFilterBar() {
      const bar = document.getElementById("video-filter-bar");
      bar.innerHTML = "";

      videoCategories.forEach(cat => {
        const btn = document.createElement("button");
        
        if(cat === "all") {
          btn.innerText = "Semua Kisah";
        } else {
          btn.innerText = cat.split("-").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
        }

        if(cat === currentVideoFilter) {
          btn.className = "bg-amber-400 text-zinc-950 text-xs px-3.5 py-1.5 rounded-full font-bold shadow-sm whitespace-nowrap transition-all";
        } else {
          btn.className = "bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-3.5 py-1.5 rounded-full font-medium border border-zinc-800/60 whitespace-nowrap transition-all";
        }

        btn.onclick = () => {
          currentVideoFilter = cat;
          buildVideoFilterBar();
          executeCombinedFilter();
        };

        bar.appendChild(btn);
      });
    }

    function buildTypeFilterBar() {
      const bar = document.getElementById("type-filter-bar");
      bar.innerHTML = "";

      const types = [
        { id: "all", label: "Semua Format", icon: "fa-border-all" },
        { id: "menegak", label: "Menegak (TikTok/Reels)", icon: "fa-mobile-screen-button" },
        { id: "lurus", label: "Lurus (YouTube Video)", icon: "fa-desktop" }
      ];

      types.forEach(type => {
        const btn = document.createElement("button");
        btn.innerHTML = `<i class="fa-solid ${type.icon} mr-1.5 opacity-80 text-[10px]"></i>${type.label}`;

        if(type.id === currentTypeFilter) {
          btn.className = "bg-amber-400 text-zinc-950 text-xs px-3.5 py-1.5 rounded-full font-bold shadow-sm whitespace-nowrap transition-all";
        } else {
          btn.className = "bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-3.5 py-1.5 rounded-full font-medium border border-zinc-800/60 whitespace-nowrap transition-all";
        }

        btn.onclick = () => {
          currentTypeFilter = type.id;
          buildTypeFilterBar();
          executeCombinedFilter();
        };

        bar.appendChild(btn);
      });
    }

    function executeCombinedFilter() {
      renderVideos(currentVideoFilter, currentTypeFilter);
    }

    function renderVideos(catFilter, typeFilter) {
      const container = document.getElementById("video-container");
      container.innerHTML = "";
      
      // Menggunakan data KISAH_KEJAYAAN_DATA dan membuang sekatan v.category === "kisah-kejayaan"
      const filtered = KISAH_KEJAYAAN_DATA.filter(v => {
        const matchCategory = (catFilter === "all" || v.category === catFilter);
        
        let matchType = true;
        if (typeFilter === "menegak") {
          matchType = v.embedCode.includes("tiktok.com") || v.embedCode.includes("shorts");
        } else if (typeFilter === "lurus") {
          matchType = v.embedCode.includes("youtube.com") && !v.embedCode.includes("shorts");
        }
        
        return matchCategory && matchType;
      });

      if(filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-zinc-500 space-y-2">
            <i class="fa-solid fa-video-slash text-2xl text-zinc-700"></i>
            <p class="text-xs">Tiada video ditemui untuk padanan paparan ini.</p>
          </div>
        `;
        return;
      }
      
      filtered.forEach(video => {
        const card = document.createElement("div");
        card.className = "bg-zinc-900 border border-zinc-800/80 rounded-2xl p-4 space-y-3 shadow-md";
        card.id = video.id;
        card.innerHTML = `
          <div class="overflow-hidden rounded-xl bg-zinc-950">
            ${video.embedCode}
          </div>
          <div class="flex flex-col space-y-2">
            <span class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">${video.category.replace("-", " ")}</span>
            <h3 class="text-sm font-bold leading-snug text-zinc-100">${video.title}</h3>
            <div class="flex justify-end pt-1">
              <button onclick="copyGlobalLink('video-kisah-kejayaan.html#${video.id}')" class="text-xs text-zinc-400 hover:text-amber-400 flex items-center gap-1.5 font-medium bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800">
                <i class="fa-solid fa-copy"></i> Kongsi
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    buildVideoFilterBar();
    buildTypeFilterBar();
    executeCombinedFilter();

    window.addEventListener("DOMContentLoaded", function () {
      const hash = window.location.hash;
      if (!hash) return;

      const targetId = hash.replace("#", "");
      const linkedVideo = KISAH_KEJAYAAN_DATA.find(v => v.id === targetId);

      if(linkedVideo) {
        if(currentVideoFilter !== "all" && currentVideoFilter !== linkedVideo.category) {
          currentVideoFilter = linkedVideo.category;
          buildVideoFilterBar();
        }
        
        currentTypeFilter = "all";
        buildTypeFilterBar();
        executeCombinedFilter();

        setTimeout(function () {
          const target = document.getElementById(targetId);
          if (!target) return;

          target.scrollIntoView({ behavior: "smooth", block: "center" });

          setTimeout(function () {
            target.classList.add("video-highlight-anim");
            target.addEventListener("animationend", function () {
              target.classList.remove("video-highlight-anim");
            }, { once: true });
          }, 600);
        }, 300);
      }
    });
  </script>
</body>
</html>
