<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilmu Emas Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Animasi Cawan Kopi Premium */
    @keyframes steam {
      0% { transform: translateY(0) scaleX(1); opacity: 0.5; }
      50% { transform: translateY(-4px) scaleX(1.1); opacity: 0.8; }
      100% { transform: translateY(-8px) scaleX(1); opacity: 0; }
    }
    .steam-line { animation: steam 2s infinite ease-in-out; }
    .steam-2 { animation-delay: 0.7s; }
  </style>
</head>
<body class="bg-[#0b0c0e] text-zinc-100 min-h-screen p-4 sm:p-6 flex flex-col justify-start items-center">

  <div class="w-full max-w-md md:max-w-xl space-y-6">
    
    <header class="flex items-center justify-between w-full border-b border-zinc-800/60 pb-5">
      
      <div>
        <h1 class="text-xl font-black tracking-tight leading-none">
          <span class="bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-500 bg-clip-text text-transparent drop-shadow-[0_0_12px_rgba(251,191,36,0.35)]">
            Ilmu Emas
          </span>
        </h1>
        
        <h2 class="text-xs font-semibold text-zinc-400/90 tracking-wider mt-1.5 uppercase bg-gradient-to-r from-zinc-400 via-zinc-200 to-zinc-500 bg-clip-text text-transparent">
          PG by Wan Hasbullah
        </h2>
      </div>

      <div class="flex items-center justify-center bg-gradient-to-b from-zinc-800/40 to-zinc-900/60 p-2.5 rounded-xl border border-zinc-700/30 shadow-inner backdrop-blur-sm">
        <svg class="w-7 h-7 text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.4)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 3c.5-1 1.5-1 2 0s.5 1 2 0" class="steam-line stroke-amber-300/60" stroke-width="1.5"/>
          <path d="M10 3c.5-1 1.5-1 2 0s.5 1 2 0" class="steam-line steam-2 stroke-amber-300/60" stroke-width="1.5"/>
          <path d="M18 8H6a2 2 0 0 0-2 2v7a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-7a2 2 0 0 0-2-2z"/>
          <path d="M18 11h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2"/>
        </svg>
      </div>

    </header>

    <section class="relative overflow-hidden rounded-2xl border border-zinc-800/80 bg-gradient-to-b from-zinc-900/90 via-zinc-900/70 to-black/80 p-5 shadow-2xl backdrop-blur-md">
      
      <div class="flex items-center space-x-2 mb-4">
        <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-[11px] font-bold uppercase tracking-widest text-emerald-400">Makluman Terkini</span>
      </div>

      <div class="space-y-4">
        
        <div class="flex items-start space-x-3 group">
          <div class="text-amber-400 mt-1 flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
            </svg>
          </div>
          <div>
            <h4 class="text-xs font-medium text-zinc-400 mb-0.5">Sistem & Aplikasi</h4>
            <p class="text-sm font-semibold text-zinc-100 group-hover:text-amber-300 transition-colors duration-200">
              Kemaskini harga premium gold wafer kini dipaparkan secara langsung (*live*) setiap jam.
            </p>
          </div>
        </div>

        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-zinc-800 to-transparent"></div>

        <div class="flex items-start space-x-3 group">
          <div class="text-amber-400 mt-1 flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
            </svg>
          </div>
          <div>
            <h4 class="text-xs font-medium text-zinc-400 mb-0.5">Aktiviti Dealership</h4>
            <p class="text-sm font-semibold text-zinc-100 group-hover:text-amber-300 transition-colors duration-200">
              Sesi bimbingan eksklusif bersama Wan Hasbullah dijadualkan pada hari Sabtu ini jam 9 malam.
            </p>
          </div>
        </div>

      </div>
    </section>

  </div>

</body>
</html>
