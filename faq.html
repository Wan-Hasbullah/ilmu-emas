<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilmu Emas - Soalan Lazim (FAQ)</title>
    <style>
        /* Typography & Custom Variables */
        :root {
            --bg-main: #0a0f1d;
            --bg-surface: #131a30;
            --bg-surface-hover: #1b2542;
            --primary-gold: #d4af37;
            --primary-gold-light: #f3e5ab;
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
            --border-color: #222f4d;
            --accent-blink: rgba(212, 175, 55, 0.2);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* 1. Header Styles */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: rgba(13, 21, 41, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--text-primary);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: var(--border-color);
        }

        .header-title {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #b5c6e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            width: 36px; /* Balance placeholder */
        }

        /* Container Layout */
        .main-container {
            max-width: 900px;
            margin: 100px auto 0 auto;
            padding: 0 20px;
        }

        /* Intro Section */
        .intro-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .intro-section h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* 2. Kategori Styles (Horizontal Scrollable for Mobile, Wrap for Desktop) */
        .categories-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
            padding-bottom: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .categories-container::-webkit-scrollbar {
            display: none; /* Safari/Chrome */
        }

        @media (min-width: 768px) {
            .categories-container {
                flex-wrap: wrap;
                overflow-x: visible;
            }
        }

        .category-tab {
            white-space: nowrap;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-tab:hover {
            background-color: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .category-tab.active {
            background: linear-gradient(135deg, #e5c046 0%, var(--primary-gold) 100%);
            color: #0a0f1d;
            border-color: var(--primary-gold);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
        }

        /* 3. Kad FAQ Styles */
        .faq-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .faq-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 22px;
            transition: border-color 0.3s, transform 0.3s;
            position: relative;
        }

        .faq-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
        }

        .faq-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }

        .faq-question {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        /* Copy Link Button */
        .copy-link-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-link-btn:hover {
            background-color: var(--bg-surface-hover);
            color: var(--primary-gold);
            border-color: var(--border-color);
        }

        .faq-answer {
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-align: justify;
        }

        .faq-answer strong {
            color: var(--primary-gold-light);
            font-weight: 600;
        }

        /* Copy Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #ffffff;
            color: #0a0f1d;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 2000;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 3. Blink Animation on Highlight */
        @keyframes cardBlink {
            0% { background-color: var(--bg-surface); border-color: var(--border-color); }
            25% { background-color: var(--accent-blink); border-color: var(--primary-gold); }
            50% { background-color: var(--bg-surface); border-color: var(--border-color); }
            75% { background-color: var(--accent-blink); border-color: var(--primary-gold); }
            100% { background-color: var(--bg-surface); border-color: var(--border-color); }
        }

        .highlight-blink {
            animation: cardBlink 2s ease-in-out;
            border-color: var(--primary-gold) !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="back-btn" onclick="window.history.back();" aria-label="Kembali">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div class="header-title">Ilmu Emas</div>
        </div>
        <div class="header-right"></div>
    </header>

    <div class="main-container">
        <div class="intro-section">
            <h1>Khazanah Ilmu Emas</h1>
            <p>Navigasi rujukan pantas simpanan dan pelaburan emas fizikal premium.</p>
        </div>

        <div class="categories-container" id="categoryContainer">
            <button class="category-tab active" onclick="filterCategory('all', this)">Semua Topik</button>
            <button class="category-tab" onclick="filterCategory('asas-simpanan', this)">Asas Simpanan Emas</button>
            <button class="category-tab" onclick="filterCategory('memilih-emas', this)">Memilih Emas Terbaik</button>
            <button class="category-tab" onclick="filterCategory('strategi-emas', this)">Strategi Jual, Beli & Pajak</button>
            <button class="category-tab" onclick="filterCategory('transaksi-pg', this)">Transaksi Public Gold</button>
            <button class="category-tab" onclick="filterCategory('akaun-gap', this)">Akaun Emas GAP</button>
            <button class="category-tab" onclick="filterCategory('bisnes-emas', this)">Bisnes Emas Public Gold</button>
        </div>

        <div class="faq-wrapper" id="faqWrapper">
            </div>
    </div>

    <div class="toast" id="toastNotification">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Pautan kad soalan berjaya disalin!
    </div>

    <script src="js/faq-data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderFAQ();
            checkHashNavigation();
        });

        // Memaparkan data FAQ secara dinamik kedalam DOM
        function renderFAQ() {
            const wrapper = document.getElementById("faqWrapper");
            wrapper.innerHTML = "";

            faqData.forEach(item => {
                const card = document.createElement("div");
                card.className = "faq-card";
                card.id = item.id;
                card.setAttribute("data-category", item.category);

                card.innerHTML = `
                    <div class="faq-header">
                        <h3 class="faq-question">${item.question}</h3>
                        <button class="copy-link-btn" onclick="copyFAQLink('${item.id}')" title="Salin pautan soalan">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                    </div>
                    <div class="faq-answer">${item.answer}</div>
                `;
                wrapper.appendChild(card);
            });
        }

        // Fungsi tapisan kategori
        function filterCategory(category, element) {
            // Tukar tab aktif
            document.querySelectorAll(".category-tab").forEach(tab => tab.classList.remove("active"));
            element.classList.add("active");

            // Tapis kad FAQ
            const cards = document.querySelectorAll(".faq-card");
            cards.forEach(card => {
                if (category === "all" || card.getAttribute("data-category") === category) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Fungsi menyalin pautan unik bagi setiap kad
        function copyFAQLink(id) {
            const cleanUrl = window.location.href.split('#')[0];
            const shareUrl = `${cleanUrl}#${id}`;

            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast();
            }).catch(err => {
                console.error("Gagal menyalin pautan: ", err);
            });
        }

        // Fungsi memaparkan maklumbalas notifikasi (Toast)
        function showToast() {
            const toast = document.getElementById("toastNotification");
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        // Fungsi menyemak parameter hash URL bagi fungsi Autoscroll & Blink Highlight
        function checkHashNavigation() {
            const hash = window.location.hash;
            if (hash) {
                const targetId = hash.replace("#", "");
                const targetCard = document.getElementById(targetId);

                if (targetCard) {
                    // Cari data untuk mengetahui kategori kad tersebut
                    const faqItem = faqData.find(item => item.id === targetId);
                    if (faqItem) {
                        // Cari tab kategori yang sepadan dan aktifkannya secara automatik
                        const targetTab = Array.from(document.querySelectorAll(".category-tab")).find(tab => 
                            tab.getAttribute("onclick") && tab.getAttribute("onclick").includes(faqItem.category)
                        );
                        if (targetTab) {
                            filterCategory(faqItem.category, targetTab);
                        }
                    }

                    // Skrol ke element secara lancar dengan offset kedudukan ketinggian header (64px)
                    setTimeout(() => {
                        const yOffset = -90; 
                        const yPosition = targetCard.getBoundingClientRect().top + window.pageYOffset + yOffset;
                        
                        window.scrollTo({ top: yPosition, behavior: "smooth" });

                        // Berikan kesan animasi kedipan (Blink highlight)
                        targetCard.classList.add("highlight-blink");
                        
                        // Buang kelas animasi setelah tamat kitaran untuk membenarkan pengulangan semula
                        setTimeout(() => {
                            targetCard.classList.remove("highlight-blink");
                        }, 2000);
                    }, 300);
                }
            }
        }

        // Memantau sebarang perubahan hash URL secara live tanpa perlu memuat semula halaman (reload)
        window.addEventListener("hashchange", checkHashNavigation);
    </script>
</body>
</html>
