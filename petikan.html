<!DOCTYPE html>
<html lang="ms" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Petikan Premium - Gold Saver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Kesan animasi berdenyut (pulse) premium apabila kad diakses melalui link */
    @keyframes cardPulse {
      0% { ring-color: rgba(251, 191, 36, 0.2); transform: scale(1); }
      50% { ring-color: rgba(251, 191, 36, 0.8); transform: scale(1.02); border-color: #fbbf24; }
      100% { ring-color: rgba(251, 191, 36, 0.2); transform: scale(1); }
    }
    .highlight-pulse {
      animation: cardPulse 1.5s ease-in-out 2;
      border-color: rgba(251, 191, 36, 0.4) !important;
    }
  </style>
</head>
<body class="min-h-screen pb-12 bg-zinc-950 max-w-md mx-auto px-4 border-x border-zinc-900/40">
  
  <header class="py-4 border-b border-zinc-900/60 flex items-center gap-3 sticky top-0 bg-zinc-950/90 backdrop-blur-md z-40 mb-6">
    <a href="../artikel.html" class="text-zinc-400 hover:text-amber-400"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="text-xs font-semibold text-zinc-400">Kembali ke Hub</span>
  </header>

  <main class="space-y-6">
    
    <div class="flex flex-wrap gap-2 mb-4">
      <span class="text-[10px] uppercase tracking-wider font-extrabold px-2.5 py-1 bg-amber-400/10 text-amber-400 rounded-md border border-amber-400/20">Tips Emas</span>
      <span class="text-[10px] uppercase tracking-wider font-extrabold px-2.5 py-1 bg-zinc-900 text-zinc-400 rounded-md border border-zinc-800">Tips Kewangan</span>
    </div>

    <div id="petikan-container" class="space-y-6">
      </div>

  </main>

  <script src="./petikan-data.js"></script>

  <script>
    // Fungsi membina paparan kad daripada data PETIKAN_DATA
    function renderPetikan() {
      const container = document.getElementById('petikan-container');
      if (!container) return;
      
      container.innerHTML = '';

      // Semakan keselamatan jika data gagal dimuatkan
      if (typeof PETIKAN_DATA === 'undefined') {
        container.innerHTML = '<p class="text-xs text-red-400 text-center py-4">Ralat: Fail petikan-data.js gagal dikesan.</p>';
        return;
      }

      PETIKAN_DATA.forEach(item => {
        const card = document.createElement('div');
        card.id = item.id;
        
        // Kelas reka bentuk Fintech premium dikembalikan ke standard v3 yang serasi
        card.className = "bg-zinc-900 bg-opacity-40 border border-zinc-900 rounded-2xl p-5 shadow-xl backdrop-blur-sm transition-all duration-300 ring-4 ring-transparent";
        
        card.innerHTML = `
          <div class="space-y-4">
            <div class="flex justify-between items-start">
              <i class="fa-solid fa-quote-left text-zinc-700 text-xl"></i>
              <span class="text-[10px] font-mono text-zinc-600">${item.date}</span>
            </div>

            <p class="text-sm text-zinc-200 leading-relaxed font-medium italic">
              "${item.quote}"
            </p>

            <hr class="border-zinc-800 border-opacity-60">

            <div class="flex justify-between items-center">
              <p class="text-xs text-amber-400 font-semibold tracking-wide">Oleh: ${item.author}</p>
              <span class="text-[10px] bg-zinc-900 px-2 py-0.5 rounded text-zinc-500 font-medium">${item.category}</span>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-2">
              <button onclick="salinDanDenyut('${item.id}')" class="text-xs bg-zinc-900 bg-opacity-80 border border-zinc-800 text-zinc-300 hover:text-amber-400 font-semibold px-3 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-link text-[11px]"></i> Salin Link
              </button>
              
              <button onclick="simpanSebagaiImej('${item.id}')" class="text-xs bg-amber-400 bg-opacity-10 border border-amber-400 border-opacity-20 text-amber-400 hover:bg-amber-400 hover:text-zinc-950 font-bold px-3 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-download text-[11px]"></i> Simpan Imej
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function salinDanDenyut(id) {
      const URL_Penuh = window.location.origin + window.location.pathname + '#' + id;
      
      navigator.clipboard.writeText(URL_Penuh).then(() => {
        const elemen = document.getElementById(id);
        if (elemen) {
          elemen.scrollIntoView({ behavior: 'smooth', block: 'center' });
          elemen.classList.add('highlight-pulse');
          setTimeout(() => {
            elemen.classList.remove('highlight-pulse');
          }, 3000);
        }
        alert('Pautan petikan berjaya disalin!');
      }).catch(err => {
        console.error('Gagal menyalin: ', err);
      });
    }

    function simpanSebagaiImej(id) {
      alert('Sistem menyediakan paparan kad cetakan.');
      window.print(); 
    }

    // Jalankan fungsi serta-merta selepas dom siap
    document.addEventListener("DOMContentLoaded", () => {
      renderPetikan();
      
      if(window.location.hash) {
        const targetId = window.location.hash.substring(1);
        setTimeout(() => {
          const elemenSasar = document.getElementById(targetId);
          if (elemenSasar) {
            elemenSasar.scrollIntoView({ behavior: 'smooth', block: 'center' });
            elemenSasar.classList.add('highlight-pulse');
            setTimeout(() => elemenSasar.classList.remove('highlight-pulse'), 3000);
          }
        }, 500);
      }
    });
  </script>
</body>
</html>
