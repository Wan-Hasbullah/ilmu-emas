<!DOCTYPE html>
<html lang="ms" class="bg-zinc-950 text-white selection:bg-amber-500 selection:text-zinc-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petikan - Ilmu Emas</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="js/petikan-data.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
    }
  </script>

  <style>
    body { background: #09090b; }

    /* ── Category pills ── */
    .cat-pill {
      cursor: pointer;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-pill.active, .cat-pill:hover {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.4);
      color: #fbbf24;
    }
    .cat-pill:not(.active) {
      background: rgba(39,39,42,0.8);
      border-color: rgba(63,63,70,0.6);
      color: #a1a1aa;
    }

    /* ── Quote card ── */
    .quote-card {
      background: linear-gradient(145deg, #18181b 60%, #1c1917 100%);
      border: 1px solid rgba(63,63,70,0.7);
      border-radius: 20px;
      padding: 20px;
      transition: border-color 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }
    .quote-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .quote-card.cat-tips-emas::before    { background: linear-gradient(to right, #fbbf24, #f59e0b); }
    .quote-card.cat-tips-kewangan::before{ background: linear-gradient(to right, #38bdf8, #0ea5e9); }
    .quote-card:hover { border-color: rgba(251,191,36,0.25); }
    .quote-card:hover::before { opacity: 1; }

    /* ── Premium Highlight Pulse (Kesan Denyut Kad) ── */
    @keyframes highlight-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0.0), 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.7); opacity: 1; }
      20%  { box-shadow: 0 0 0 6px rgba(251,191,36,0.3), 0 12px 32px rgba(251,191,36,0.25); border-color: rgba(251,191,36,0.9); opacity: 0.85; }
      40%  { box-shadow: 0 0 0 2px rgba(251,191,36,0.1), 0 4px 12px rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.4); opacity: 1; }
      60%  { box-shadow: 0 0 0 5px rgba(251,191,36,0.25), 0 8px 24px rgba(251,191,36,0.2); border-color: rgba(251,191,36,0.8); opacity: 0.88; }
      80%  { box-shadow: 0 0 0 2px rgba(251,191,36,0.08), 0 4px 10px rgba(251,191,36,0.06); border-color: rgba(251,191,36,0.35); opacity: 1; }
      100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0), 0 0 0 0 rgba(251,191,36,0.0); border-color: rgba(63,63,70,0.7); opacity: 1; }
    }
    .highlight-anim { animation: highlight-pulse 1s ease forwards; scroll-margin-top: 100px; }

    /* ── Category badge colours ── */
    .badge-tips-emas     { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .badge-tips-kewangan { background: rgba(56,189,248,0.10); color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); }

    /* ── Share modal ── */
    #share-modal { transition: opacity 0.3s ease; }

    /* ── Capture card for html2canvas ── */
    #capture-card {
      width: 800px;
      min-height: 420px;
      background: linear-gradient(135deg, #18181b 0%, #1c1917 100%);
      border-radius: 24px;
      padding: 60px 56px;
      position: relative;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    #capture-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(251,191,36,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Slim scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

    /* ── Off-screen capture area ── */
    #offscreen-capture {
      position: fixed;
      left: -9999px;
      top: 0;
      pointer-events: none;
      z-index: -1;
    }

    /* ── Coffee Cup Animation (Sama seperti index.html) ── */
    .coffee-cup-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 44px;
    }
    .coffee-cup-wrap svg {
      width: 26px;
      height: 26px;
      position: absolute;
      bottom: 9px;
    }
    .steam {
      stroke: #fbbf24;
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
      opacity: 0;
      animation: steam-svg 1.8s ease-in-out infinite;
    }
    .steam-1 { animation-delay: 0s; }
    .steam-2 { animation-delay: 0.5s; }
    @keyframes steam-svg {
      0%   { opacity: 0; transform: translateY(0px); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-7px); }
    }

    /* ── Bubbles ── */
    .coffee-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(251,191,36,0.55);
      pointer-events: none;
      animation: bubble-rise 1s ease-out forwards;
    }
    @keyframes bubble-rise {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      60%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-22px) scale(0.5); }
    }

    /* ── Tooltip "Nak simpan emas?" ── */
    .coffee-tooltip {
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, #1c1917, #18181b);
      border: 1px solid rgba(251,191,36,0.35);
      color: #fbbf24;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      padding: 5px 11px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      box-shadow: 0 4px 16px rgba(251,191,36,0.12);
      letter-spacing: 0.02em;
    }
    .coffee-tooltip::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 6px solid rgba(251,191,36,0.35);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }
    .coffee-tooltip.visible { opacity: 1; }

    /* Dropdown Transition */
    #coffee-dropdown {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #coffee-dropdown.show {
      display: block !important;
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-fade { animation: card-in 0.3s ease both; }
    #empty-state { display: none; }
  </style>
</head>
<body class="min-h-screen pb-10 font-sans antialiased bg-zinc-950">

  <header class="sticky top-0 z-40 bg-zinc-950/85 backdrop-blur-md border-b border-zinc-800/60 p-4 max-w-md mx-auto w-full flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-zinc-400 hover:text-amber-400"><i class="fa-solid fa-arrow-left text-lg"></i></a>
      <h1 class="text-base font-bold bg-gradient-to-r from-amber-400 to-yellow-400 bg-clip-text text-transparent tracking-tight">Petikan</h1>
    </div>
    
    <div class="relative">
      <button onclick="toggleCoffeeMenu()" id="coffee-btn"
        class="flex items-center justify-center text-amber-400 focus:outline-none transition-colors hover:text-yellow-300"
        style="background:none; border:none; padding:0;">
        <div class="coffee-cup-wrap" id="coffee-cup-wrap">
          <div class="coffee-tooltip" id="coffee-tooltip">Nak simpan emas?</div>
          <div id="bubble-container" style="position:absolute;bottom:9px;left:0;width:26px;height:26px;pointer-events:none;overflow:visible;"></div>
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="steam steam-1" d="M9 4C9 4 7.5 5.5 9 7C10.5 8.5 9 10 9 10" />
            <path class="steam steam-2" d="M13 3C13 3 11.5 4.5 13 6C14.5 7.5 13 9 13 9" />
            <path d="M18 10H4C2.89543 10 2 10.8954 2 12V15C2 18.3137 4.68629 21 8 21H14C17.3137 21 20 18.3137 20 15V12C20 10.8954 19.1046 10 18 10Z" fill="#fbbf24" />
            <path d="M20 12C20 12 22 12 22 14.5C22 17 20 17 20 17" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none" />
          </svg>
        </div>
      </button>

      <div id="coffee-dropdown"
        class="absolute right-0 mt-3 w-52 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 hidden opacity-0 -translate-y-2 shadow-2xl z-50">

        <button onclick="triggerDaftarPopup()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors text-left">
          <i class="fa-solid fa-user-plus text-amber-400"></i>
          <span>Daftar Percuma</span>
        </button>

        <a href="https://pgdealer-wanhasbullah.pages.dev/chat-assist-faq" target="_blank"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">
          <i class="fa-solid fa-comments text-amber-400"></i>
          <span>Pertanyaan</span>
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-5 space-y-5">
    <div class="text-center space-y-1">
      <p class="text-xs text-zinc-500 uppercase tracking-widest font-semibold">Pesan Mentor</p>
      <h2 class="text-lg font-extrabold text-white leading-snug">Motivasi Kewangan &amp; Simpanan Emas</h2>
    </div>

    <div id="filter-bar" class="flex gap-2 overflow-x-auto pb-1">
    </div>

    <div id="quotes-container" class="space-y-4">
    </div>

    <div id="empty-state" class="text-center py-16 space-y-2">
      <i class="fa-solid fa-quote-left text-zinc-700 text-3xl"></i>
      <p class="text-zinc-500 text-sm">Tiada petikan dalam kategori ini.</p>
    </div>
  </main>

  <div id="share-modal" class="fixed inset-0 z-50 bg-zinc-950/80 backdrop-blur-sm flex items-end justify-center px-4 pb-8 hidden opacity-0">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 w-full max-w-sm space-y-4 shadow-2xl">
      <div class="flex items-center justify-between">
        <h4 class="font-bold text-base text-white">Kongsi Petikan</h4>
        <button onclick="closeShare()" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white transition-all">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="copyQuoteLink()" class="flex items-center justify-center gap-2 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-semibold text-zinc-200 transition-all">
          <i class="fa-regular fa-copy text-amber-400"></i> Salin Pautan
        </button>
        <button onclick="shareWhatsapp()" class="flex items-center justify-center gap-2 py-3 bg-[#1a3d2b] hover:bg-[#1f4a33] border border-[#25D366]/20 rounded-xl text-sm font-semibold text-[#25D366] transition-all">
          <i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp
        </button>
      </div>
    </div>
  </div>

  <div id="daftar-pilihan-modal" class="fixed inset-0 z-50 bg-zinc-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden opacity-0 transition-all duration-300">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm text-center space-y-4">
      <h4 class="font-bold text-lg text-white">Kategori Pendaftaran Akaun</h4>
      <p class="text-xs text-zinc-400">Pilih kategori umur pemohon di bawah:</p>
      <div class="space-y-3 pt-2">
        <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-adult" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-sm rounded-xl transition-all">Dewasa (18 Tahun Ke Atas)</a>
        <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-junior" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-sm rounded-xl transition-all">Junior (17 Tahun Ke Bawah)</a>
      </div>
      <button onclick="closeDaftarPopup()" class="text-xs text-zinc-500 hover:text-zinc-300 pt-2 block mx-auto underline">Tutup</button>
    </div>
  </div>

  <div id="offscreen-capture">
    <div id="capture-card"></div>
  </div>

  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-white text-xs font-semibold px-5 py-3 rounded-full shadow-xl opacity-0 pointer-events-none transition-opacity duration-300 z-[999]">
    Pautan disalin!
  </div>

  <script>
    // Fungsi Toggle Dropdown Kopi (Sama seperti index.html)
    function toggleCoffeeMenu() {
      const dropdown = document.getElementById("coffee-dropdown");
      dropdown.classList.toggle("show");
    }

    // ── Coffee Bubble & Tooltip Animation ──
    (function initCoffeeBubbles() {
      const container = document.getElementById('bubble-container');
      const tooltip   = document.getElementById('coffee-tooltip');
      if (!container) return;

      function spawnBubble() {
        const b = document.createElement('div');
        const size = 3 + Math.random() * 4;
        b.className = 'coffee-bubble';
        b.style.cssText = `
          width:${size}px;height:${size}px;
          left:${4 + Math.random()*14}px;
          bottom:${2 + Math.random()*6}px;
          animation-duration:${0.7 + Math.random()*0.5}s;
          animation-delay:${Math.random()*0.3}s;
        `;
        container.appendChild(b);
        setTimeout(() => b.remove(), 1200);
      }

      // Phase 1: burst of bubbles for first 5s
      let phase1 = setInterval(spawnBubble, 280);
      setTimeout(() => {
        clearInterval(phase1);
        // Phase 2: gentle bubbles from 5s–15s (every 10s cycle)
        let phase2 = setInterval(spawnBubble, 900);
        setTimeout(() => clearInterval(phase2), 10000);
      }, 5000);

      // Tooltip "Nak simpan emas?" — show at 1.5s for 3s
      setTimeout(() => {
        tooltip.classList.add('visible');
        setTimeout(() => tooltip.classList.remove('visible'), 3000);
      }, 1500);
    })();

    // Fungsi untuk membuka Modal Daftar Percuma
    function triggerDaftarPopup() {
      const dropdown = document.getElementById("coffee-dropdown");
      if (dropdown) dropdown.classList.remove("show");

      const modal = document.getElementById("daftar-pilihan-modal");
      modal.classList.remove("hidden");
      void modal.offsetWidth; 
      modal.classList.remove("opacity-0");
    }

    // Fungsi untuk menutup Modal Daftar Percuma
    function closeDaftarPopup() {
      const modal = document.getElementById("daftar-pilihan-modal");
      modal.classList.add("opacity-0");
      setTimeout(() => {
        modal.classList.add("hidden");
      }, 300);
    }

    // Klik luar untuk menutup dropdown kopi
    window.addEventListener("click", (e) => {
      const btn = document.getElementById("coffee-btn");
      const dropdown = document.getElementById("coffee-dropdown");
      if (btn && dropdown && !btn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove("show");
      }
    });

    let activeCat = 'semua';

    function buildFilterBar() {
      const bar = document.getElementById('filter-bar');
      let html = `<button class="cat-pill active" id="pill-semua" data-cat="semua" onclick="filterCat('semua',this)">Semua</button>`;

      const dynamicCategories = [...new Set(PETIKAN.map(p => p.kategori))];

      dynamicCategories.forEach(key => {
        const cfg = KATEGORI_CONFIG[key];
        const label = cfg ? cfg.label : key.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
        const icon = cfg ? cfg.icon : "fa-tag";

        html += `
          <button class="cat-pill" id="pill-${key}" data-cat="${key}" onclick="filterCat('${key}',this)">
            <i class="fa-solid ${icon} mr-1 text-[10px]"></i>${label}
          </button>`;
      });

      bar.innerHTML = html;
    }

    function buildCard(item, delay) {
      const cfg = KATEGORI_CONFIG[item.kategori];
      const label = cfg ? cfg.label : item.kategori.replace("-", " ");
      const badgeClass  = `badge-${item.kategori}`;
      const quoteColour = item.kategori === 'tips-emas' ? 'text-amber-400/60' : 'text-sky-400/60';

      return `
        <div id="${item.id}"
          class="quote-card cat-${item.kategori} card-fade"
          data-cat="${item.kategori}"
          style="animation-delay:${delay}ms">

          <div class="flex items-center justify-between mb-3">
            <span class="${badgeClass} text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full border border-zinc-800">
              ${label}
            </span>
            <span class="text-xs text-zinc-500">
              Oleh: <span class="text-zinc-300 font-semibold">${item.oleh}</span>
            </span>
          </div>

          <div class="relative pl-4 mb-4">
            <span class="absolute left-0 top-0 ${quoteColour} text-3xl font-serif leading-none">"</span>
            <p class="text-zinc-100 text-[15px] font-medium leading-relaxed pt-4">${item.petikan}</p>
          </div>

          <div class="flex gap-2 mt-3 items-center">
            ${item.link ? `
            <a href="${item.link}" target="_blank" rel="noopener"
              class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs font-semibold transition-all">
              <i class="fa-solid fa-comments text-amber-400"></i> Baca Komen
            </a>` : ''}
            <button onclick="saveImage('${item.id}')"
              title="Simpan Imej"
              class="flex items-center justify-center w-10 h-10 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-amber-400 transition-all">
              <i class="fa-solid fa-image text-sm"></i>
            </button>
            <button onclick="openShare('${item.id}')"
              title="Kongsi"
              class="flex items-center justify-center w-10 h-10 rounded-xl bg-amber-400/10 hover:bg-amber-400/20 border border-amber-400/25 text-amber-400 transition-all">
              <i class="fa-solid fa-share-nodes text-sm"></i>
            </button>
          </div>
        </div>`;
    }

    function renderCards(cat) {
      const container = document.getElementById('quotes-container');
      const empty     = document.getElementById('empty-state');

      const filtered = cat === 'semua'
        ? PETIKAN
        : PETIKAN.filter(p => p.kategori === cat);

      if (filtered.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = filtered.map((item, i) => buildCard(item, i * 60)).join('');
    }

    function filterCat(cat, btn) {
      activeCat = cat;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderCards(cat);
    }

    // ── PENAMBAHAN SISTEM AUTO SCROLL & HIGHLIGHT DENYUTAN ──
    function handleHashHighlight() {
      const hash = window.location.hash;
      if (!hash) return;

      const targetId = hash.replace("#", "");
      const linkedItem = PETIKAN.find(p => p.id === targetId);
      
      if (linkedItem) {
        // Jika item berada dalam kategori lain dan penapis sekarang menyekatnya, paksa tukar tab atau render semua kad
        if (activeCat !== 'semua' && activeCat !== linkedItem.kategori) {
          const targetPill = document.getElementById(`pill-${linkedItem.kategori}`) || document.getElementById('pill-semua');
          filterCat(linkedItem.kategori, targetPill);
        }

        // Jalankan auto-scroll lancar dan animasi denyutan
        setTimeout(() => {
          const targetEl = document.getElementById(targetId);
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Tambah class denyutan neon kelabu-keemasan premium
            setTimeout(() => {
              targetEl.classList.add('highlight-anim');
              targetEl.addEventListener('animationend', () => {
                targetEl.classList.remove('highlight-anim');
              }, { once: true });
            }, 450);
          }
        }, 100);
      }
    }

    let currentShareId = null;

    function openShare(id) {
      currentShareId = id;
      const modal = document.getElementById('share-modal');
      modal.classList.remove('hidden');
      void modal.offsetWidth;
      modal.classList.remove('opacity-0');
    }

    function closeShare() {
      const modal = document.getElementById('share-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 300);
    }

    function copyQuoteLink() {
      if (!currentShareId) return;
      const url = window.location.origin + window.location.pathname + '#' + currentShareId;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Pautan disalin!');
        closeShare();
      }).catch(() => showToast('Gagal menyalin pautan.'));
    }

    function shareWhatsapp() {
      if (!currentShareId) return;
      const item = PETIKAN.find(p => p.id === currentShareId);
      const url  = window.location.origin + window.location.pathname + '#' + currentShareId;
      const msg  = encodeURIComponent('✨ Petikan Ilmu Emas:\n\n"' + (item ? item.petikan : '') + '"\n\n🔗 ' + url);
      window.open('https://wa.me/?text=' + msg, '_blank');
      closeShare();
    }

    function saveImage(id) {
      const item = PETIKAN.find(p => p.id === id);
      if (!item) return;
      const cfg = KATEGORI_CONFIG[item.kategori];
      
      const defaultTopBar = '#fbbf24';
      const defaultAccent = '#fbbf24';
      const defaultAccentBgImg = 'rgba(251,191,36,0.1)';
      const defaultBorderImg = 'rgba(251,191,36,0.2)';
      const defaultQuoteChar = 'rgba(251,191,36,0.3)';
      const defaultLabel = item.kategori.toUpperCase();

      const topBar = cfg ? cfg.topBar : defaultTopBar;
      const accentBgImg = cfg ? cfg.accentBgImg : defaultAccentBgImg;
      const accent = cfg ? cfg.accent : defaultAccent;
      const borderImg = cfg ? cfg.borderImg : defaultBorderImg;
      const label = cfg ? cfg.label : defaultLabel;
      const quoteChar = cfg ? cfg.quoteChar : defaultQuoteChar;

      const captureDiv = document.getElementById('capture-card');
      captureDiv.innerHTML =
        '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:' + topBar + ';border-radius:24px 24px 0 0;"></div>' +
        '<div style="position:absolute;top:0;right:0;width:260px;height:260px;background:radial-gradient(circle,' + accentBgImg + ' 0%,transparent 70%);pointer-events:none;"></div>' +
        '<div>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">' +
            '<span style="background:' + accentBgImg + ';color:' + accent + ';border:1px solid ' + borderImg + ';padding:5px 14px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">' + label + '</span>' +
            '<span style="color:#71717a;font-size:12px;">Oleh: <strong style="color:#d4d4d8;">' + item.oleh + '</strong></span>' +
          '</div>' +
          '<div style="position:relative;padding-left:20px;">' +
            '<span style="position:absolute;left:0;top:-8px;color:' + quoteChar + ';font-size:56px;line-height:1;font-family:Georgia,serif;">"</span>' +
            '<p style="color:#f4f4f5;font-size:22px;font-weight:600;line-height:1.6;padding-top:28px;">' + item.petikan + '</p>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:20px;border-top:1px solid rgba(63,63,70,0.5);">' +
          '<span style="color:#71717a;font-size:11px;">ilmu-emas.pages.dev</span>' +
          '<span></span>' +
        '</div>';

      showToast('Menjana imej...');

      html2canvas(captureDiv, {
        scale: 2,
        backgroundColor: '#18181b',
        useCORS: true,
        logging: false
      }).then(function(canvas) {
        var link = document.createElement('a');
        link.download = 'petikan-ilmu-emas-' + id + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Imej berjaya disimpan!');
      }).catch(function() {
        showToast('Gagal menjana imej.');
      });
    }

    var toastTimer;
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { t.style.opacity = '0'; }, 2500);
    }

    window.addEventListener('DOMContentLoaded', function() {
      buildFilterBar();
      renderCards('semua');
      handleHashHighlight();
    });

    // Kesan perubahan hash secara dinamik sekiranya link diklik semula semasa berada pada halaman yang sama
    window.addEventListener('hashchange', handleHashHighlight);
  </script>
</body>
</html>
