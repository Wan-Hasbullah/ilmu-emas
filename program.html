<!DOCTYPE html>
<html lang="ms" class="bg-zinc-950 text-white scroll-smooth selection:bg-amber-500 selection:text-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Hub | Fintech Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premiumDark: '#09090b', /* zinc-950 */
                        premiumCard: '#18181b', /* zinc-900 */
                        premiumGold: '#fbbf24', /* amber-400 */
                        premiumAccent: '#27272a', /* zinc-800 */
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #09090b; color: #e4e4e7; }

        /* Kesan Blink Highlight Premium Berdenyut Emas */
        @keyframes blinkGold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: #27272a; }
            50% { box-shadow: 0 0 25px 5px rgba(251, 191, 36, 0.35); border-color: #fbbf24; }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: #27272a; }
        }
        .highlight-card { animation: blinkGold 1.5s ease-in-out 2; border-width: 2px !important; }

        /* Custom Scrollbar Premium Fintech */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Coffee Cup Animation (Penyepaduan Premium) ── */
        .coffee-cup-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 44px;
        }
        .coffee-cup-wrap svg {
            width: 26px;
            height: 26px;
            position: absolute;
            bottom: 9px;
        }
        .steam {
            stroke: #fbbf24;
            stroke-width: 2;
            stroke-linecap: round;
            fill: none;
            opacity: 0;
            animation: steam-svg 1.8s ease-in-out infinite;
        }
        .steam-1 { animation-delay: 0s; }
        .steam-2 { animation-delay: 0.5s; }
        @keyframes steam-svg {
            0%   { opacity: 0; transform: translateY(0px); }
            30%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(-7px); }
        }
        
        /* Dropdown Smooth Transition */
        #coffee-dropdown {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #coffee-dropdown.show {
            display: block !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body class="antialiased min-h-screen bg-zinc-950 text-zinc-200">

    <header class="sticky top-0 z-40 bg-zinc-950/85 backdrop-blur-md border-b border-zinc-900">
        <div class="max-w-7xl mx-auto px-5 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2.5 rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-amber-400 hover:border-amber-400/40 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-zinc-100 to-zinc-400 bg-clip-text text-transparent uppercase">Program</h1>
            </div>
            
            <div class="relative">
                <button onclick="toggleCoffeeMenu()" id="coffee-btn"
                    class="flex items-center justify-center text-amber-400 focus:outline-none transition-colors hover:text-yellow-300"
                    style="background:none; border:none; padding:0;">
                    <div class="coffee-cup-wrap">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="steam steam-1" d="M9 4C9 4 7.5 5.5 9 7C10.5 8.5 9 10 9 10" />
                            <path class="steam steam-2" d="M13 3C13 3 11.5 4.5 13 6C14.5 7.5 13 9 13 9" />
                            <path d="M18 10H4C2.89543 10 2 10.8954 2 12V15C2 18.3137 4.68629 21 8 21H14C17.3137 21 20 18.3137 20 15V12C20 10.8954 19.1046 10 18 10Z" fill="#fbbf24" />
                            <path d="M20 12C20 12 22 12 22 14.5C22 17 20 17 20 17" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                </button>

                <div id="coffee-dropdown"
                    class="absolute right-0 mt-3 w-52 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 hidden opacity-0 -translate-y-2 shadow-2xl z-50">

                    <button onclick="triggerDaftarPopup()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors text-left">
                        <i class="fa-solid fa-user-plus text-amber-400"></i>
                        <span>Daftar Percuma</span>
                    </button>

                    <a href="https://pgdealer-wanhasbullah.pages.dev/chat-assist-faq" target="_blank"
                        class="flex items-center gap-3 px-4 py-2.5 text-sm text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">
                        <i class="fa-solid fa-comments text-amber-400"></i>
                        <span>Pertanyaan</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-5 mt-8">
        <div class="flex gap-2 overflow-x-auto pb-4 hide-scroll" id="filter-bar">
            <button onclick="filterCategory('All')" id="btn-All" class="cat-btn px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all border border-amber-400 bg-amber-400 text-zinc-950 shadow-md shadow-amber-400/10">Semua</button>
            <button onclick="filterCategory('G100 Talk Show')" id="btn-G100" class="cat-btn px-5 py-2 rounded-xl text-xs font-medium whitespace-nowrap transition-all border border-zinc-800/60 bg-zinc-900 text-zinc-400 hover:text-zinc-200 hover:border-zinc-700">G100 Talk Show</button>
            <button onclick="filterCategory('QnA Public Gold')" id="btn-QnA" class="cat-btn px-5 py-2 rounded-xl text-xs font-medium whitespace-nowrap transition-all border border-zinc-800/60 bg-zinc-900 text-zinc-400 hover:text-zinc-200 hover:border-zinc-700">QnA Public Gold</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-5 py-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="listing-container">
        </div>
    </main>

    <div id="modal-view" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-950/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="relative bg-zinc-900 border border-zinc-800 w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 p-2.5 bg-zinc-950/60 rounded-full text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all border border-zinc-800/80">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" />
                </svg>
            </button>
            
            <div class="md:w-1/2 bg-black flex items-center justify-center">
                <img id="modal-img" src="" alt="Poster" class="w-full h-auto object-contain max-h-[50vh] md:max-h-[80vh]">
            </div>
            
            <div class="md:w-1/2 p-6 md:p-8 flex flex-col justify-center">
                <span id="modal-cat" class="text-[10px] font-bold text-amber-400 uppercase tracking-widest mb-3 bg-amber-400/5 px-2.5 py-1 rounded-md border border-amber-400/10 inline-block w-max">Kategori</span>
                <h2 id="modal-title" class="text-xl md:text-2xl font-bold text-white mb-4 leading-tight">Tajuk Program</h2>
                <p id="modal-caption" class="text-xs text-zinc-400 leading-relaxed mb-6 text-justify">Keterangan program...</p>
                
                <div class="pt-5 border-t border-zinc-800/80 flex flex-col sm:flex-row gap-3">
                    <button id="modal-btn-copy" onclick="" class="flex-1 py-3 px-4 rounded-xl bg-zinc-800 text-zinc-200 font-semibold text-xs uppercase tracking-wider hover:bg-zinc-700 transition-all border border-zinc-700/60 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-copy"></i> Salin Pautan
                    </button>
                    <a id="modal-btn-lanjut" href="#" target="_blank" class="flex-1 py-3 px-4 rounded-xl bg-amber-400 text-zinc-950 font-bold text-xs uppercase tracking-wider hover:bg-white text-center transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> Lanjut
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="daftar-pilihan-modal" class="fixed inset-0 z-50 bg-zinc-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden opacity-0 transition-all duration-300">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm text-center space-y-4">
            <h4 class="font-bold text-base text-white">Kategori Pendaftaran Akaun</h4>
            <p class="text-xs text-zinc-400">Pilih kategori umur pemohon di bawah:</p>
            <div class="space-y-3 pt-1">
                <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-adult" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-xs rounded-xl transition-all border border-zinc-700/30">Dewasa (18 Tahun Ke Atas)</a>
                <a href="https://pgdealer-wanhasbullah.pages.dev/pendaftaran-junior" target="_blank" class="block w-full py-3 bg-zinc-800 hover:bg-amber-400 hover:text-zinc-950 font-semibold text-xs rounded-xl transition-all border border-zinc-700/30">Junior (17 Tahun Ke Bawah)</a>
            </div>
            <button onclick="closeDaftarPopup()" class="text-xs text-zinc-500 hover:text-zinc-300 pt-1 block mx-auto underline">Tutup</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-5 py-3 bg-zinc-800 border border-zinc-700 text-white rounded-full font-semibold text-xs shadow-2xl transition-all duration-500 translate-y-20 opacity-0 z-50 flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span>Pautan Berjaya Disalin!</span>
    </div>

    <script src="js/program-data.js"></script>
    <script>
        let currentCategory = 'All';

        function renderPrograms() {
            const container = document.getElementById('listing-container');
            container.innerHTML = '';

            const filtered = currentCategory === 'All' 
                ? programData 
                : programData.filter(p => p.category === currentCategory);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.id = item.id;
                card.className = "group relative bg-zinc-900 border border-zinc-800/80 rounded-[2rem] p-4 transition-all duration-500 hover:border-amber-400/30";
                
                card.innerHTML = `
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-950">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" onerror="this.src='https://placehold.co/600x400/18181b/fbbf24?text=Poster+Akan+Datang'">
                        <div class="absolute inset-0 bg-gradient-to-t from-zinc-950/40 via-transparent opacity-65"></div>
                    </div>
                    
                    <div class="px-1">
                        <span class="text-[10px] font-extrabold text-amber-400 uppercase tracking-[0.15em] mb-2 block">${item.category}</span>
                        <h3 class="text-base font-bold text-zinc-100 mb-2 leading-snug min-h-[48px] line-clamp-2">${item.title}</h3>
                        <p class="text-zinc-400 text-xs line-clamp-2 mb-5 font-medium leading-relaxed">${item.caption}</p>
                        
                        <div class="flex gap-2.5">
                            <button onclick="openModal('${item.id}')" class="flex-1 py-3 rounded-xl bg-amber-400 text-zinc-950 font-bold text-xs uppercase tracking-wide hover:bg-white transition-all">Lihat</button>
                            <button onclick="copyLink('${item.id}')" class="p-3 rounded-xl bg-zinc-800 border border-zinc-700/60 text-zinc-300 hover:text-amber-400 hover:bg-zinc-700 transition-all" title="Salin Pautan">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 002-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // FUNGSI MODAL (LIHAT) - DENGAN 2 BUTANG BARU: SALIN & LANJUT
        function openModal(id) {
            const data = programData.find(p => p.id === id);
            const modal = document.getElementById('modal-view');
            
            document.getElementById('modal-img').src = data.image;
            document.getElementById('modal-cat').innerText = data.category;
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-caption').innerText = data.caption;
            
            // Konfigurasi butang salin dalam modal
            document.getElementById('modal-btn-copy').setAttribute('onclick', `copyLink('${data.id}')`);
            
            // Konfigurasi butang lanjut dinamik daripada parameter link di program-data.js
            const btnLanjut = document.getElementById('modal-btn-lanjut');
            if(data.link) {
                btnLanjut.href = data.link;
                btnLanjut.style.display = "flex";
            } else {
                btnLanjut.style.display = "none";
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal-view');
            modal.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // FUNGSI COPY LINK & BLINK
        function copyLink(id) {
            const url = window.location.origin + window.location.pathname + '#' + id;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.replace('translate-y-20', 'translate-y-0');
                toast.classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.replace('translate-y-0', 'translate-y-20');
                    toast.classList.replace('opacity-100', 'opacity-0');
                }, 2500);
            });
        }

        function handleHash() {
            const hash = window.location.hash.substring(1);
            if(hash) {
                const target = document.getElementById(hash);
                if(target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    target.classList.add('highlight-card');
                    setTimeout(() => target.classList.remove('highlight-card'), 3500);
                }
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            
            // Mengemas kini gaya visual butang penapis tab
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-5 py-2 rounded-xl text-xs font-medium whitespace-nowrap transition-all border border-zinc-800/60 bg-zinc-900 text-zinc-400 hover:text-zinc-200 hover:border-zinc-700";
            });
            
            const activeId = cat === 'All' ? 'btn-All' : (cat === 'G100 Talk Show' ? 'btn-G100' : 'btn-QnA');
            const activeBtn = document.getElementById(activeId);
            if(activeBtn) {
                activeBtn.className = "cat-btn px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all border border-amber-400 bg-amber-400 text-zinc-950 shadow-md shadow-amber-400/10";
            }
            
            renderPrograms();
        }

        // ── Fungsi Interaksi Dropdown Kopi & Modal ──
        function toggleCoffeeMenu() {
            const dropdown = document.getElementById("coffee-dropdown");
            dropdown.classList.toggle("show");
        }

        function triggerDaftarPopup() {
            const dropdown = document.getElementById("coffee-dropdown");
            if (dropdown) dropdown.classList.remove("show");

            const modal = document.getElementById("daftar-pilihan-modal");
            modal.classList.remove("hidden");
            void modal.offsetWidth; 
            modal.classList.remove("opacity-0");
        }

        function closeDaftarPopup() {
            const modal = document.getElementById("daftar-pilihan-modal");
            modal.classList.add("opacity-0");
            setTimeout(() => {
                modal.classList.add("hidden");
            }, 300);
        }

        // Klik luar untuk menutup dropdown menu cawan kopi
        window.addEventListener("click", (e) => {
            const btn = document.getElementById("coffee-btn");
            const dropdown = document.getElementById("coffee-dropdown");
            if (btn && dropdown && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove("show");
            }
        });

        window.onload = () => {
            renderPrograms();
            setTimeout(handleHash, 500);
        };
        window.onhashchange = handleHash;
    </script>
</body>
</html>
