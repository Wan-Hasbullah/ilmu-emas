<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Premium Fintech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fintechDark: '#0B0F19',
                        fintechCard: '#151D30',
                        fintechGold: '#D4AF37',
                        fintechGoldHover: '#F3E5AB',
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        /* Kesan Blink/Highlight Premium */
        @keyframes premiumBlink {
            0%, 100% { border-color: rgba(212, 175, 55, 0.2); box-shadow: none; }
            50% { border-color: #D4AF37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
        }
        .blink-highlight {
            animation: premiumBlink 1.5s ease-in-out 2;
        }
    </style>
</head>
<body class="bg-fintechDark text-gray-100 font-sans antialiased min-h-screen pb-12">

    <header class="sticky top-0 z-50 bg-fintechDark/80 backdrop-blur-md border-b border-gray-800 px-4 py-4 md:px-8">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="#" onclick="window.history.back(); return false;" class="text-gray-400 hover:text-fintechGold transition-colors" aria-label="Kembali">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                </a>
                <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r flow-root from-white to-gray-400 bg-clip-text text-transparent">Program</h1>
            </div>
            <div></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8 md:px-8">
        <div class="flex gap-2 overflow-x-auto pb-4 mb-8 border-b border-gray-800 scrollbar-none" id="category-filters">
            <button onclick="filterCategory('All')" id="btn-All" class="cat-btn px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 bg-fintechGold text-fintechDark font-semibold shadow-lg shadow-fintechGold/10">Semua</button>
            <button onclick="filterCategory('G100 Talk Show')" id="btn-G100" class="cat-btn px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 bg-fintechCard text-gray-400 hover:text-white border border-gray-800">G100 Talk Show</button>
            <button onclick="filterCategory('QnA Public Gold')" id="btn-QnA" class="cat-btn px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 bg-fintechCard text-gray-400 hover:text-white border border-gray-800">QnA Public Gold</button>
            <button onclick="filterCategory('Membina Rm1 Juta Pertama')" id="btn-Rm1Juta" class="cat-btn px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 bg-fintechCard text-gray-400 hover:text-white border border-gray-800">Membina RM1 Juta Pertama</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="program-container">
            </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 text-sm font-medium">
        Pautan kad berjaya disalin ke papan klip!
    </div>

    <script src="js/program-data.js"></script>

    <script>
        let currentFilter = 'All';

        // Fungsi untuk memaparkan kad program
        function renderPrograms() {
            const container = document.getElementById('program-container');
            container.innerHTML = '';

            const filteredData = currentFilter === 'All' 
                ? programData 
                : programData.filter(p => p.category === currentFilter);

            filteredData.forEach(program => {
                const card = document.createElement('div');
                card.id = program.id;
                // Reka bentuk kad premium fintech
                card.className = "bg-fintechCard border border-gray-800 rounded-2xl overflow-hidden transition-all duration-300 hover:border-fintechGold/50 flex flex-col justify-between";
                
                card.innerHTML = `
                    <div>
                        <div class="relative aspect-[16/9] w-full bg-gray-900 overflow-hidden group">
                            <img src="${program.image}" alt="${program.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://placehold.co/600x400/151d30/ffffff?text=Poster+Tiada'">
                            <span class="absolute top-3 left-3 bg-fintechDark/80 backdrop-blur-sm text-fintechGold text-xs font-semibold px-3 py-1 rounded-full border border-fintechGold/30">${program.category}</span>
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold text-white mb-2 tracking-wide leading-snug hover:text-fintechGold transition-colors">${program.title}</h3>
                            <p class="text-gray-400 text-sm leading-relaxed">${program.caption}</p>
                        </div>
                    </div>
                    <div class="p-5 pt-0">
                        <button onclick="copyProgramLink('${program.id}')" class="w-full bg-gradient-to-r from-gray-800 to-gray-900 hover:from-fintechGold hover:to-amber-500 text-gray-300 hover:text-fintechDark font-medium text-sm py-3 px-4 rounded-xl transition-all duration-300 border border-gray-700 hover:border-transparent flex items-center justify-center gap-2 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
                            </svg>
                            Salin Pautan Program
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fungsi Filter Kategori & Kemas Kini Gaya Butang
        function filterCategory(category) {
            currentFilter = category;
            renderPrograms();
            
            // Set semula gaya semua butang kpd tidak aktif
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 bg-fintechCard text-gray-400 hover:text-white border border-gray-800";
            });

            // Set butang aktif
            const activeIdMap = {
                'All': 'btn-All',
                'G100 Talk Show': 'btn-G100',
                'QnA Public Gold': 'btn-QnA',
                'Membina Rm1 Juta Pertama': 'btn-Rm1Juta'
            };
            document.getElementById(activeIdMap[category]).className = "cat-btn px-5 py-2.5 rounded-full text-sm font-semibold transition-all duration-300 bg-fintechGold text-fintechDark shadow-lg shadow-fintechGold/20";
        }

        // Fungsi Salin Pautan Kad
        function copyProgramLink(id) {
            const baseUrl = window.location.href.split('#')[0];
            const fullUrl = `${baseUrl}#${id}`;
            
            navigator.clipboard.writeText(fullUrl).then(() => {
                showToast();
            });
        }

        // Papar Toast Sentuhan Premium
        function showToast() {
            const toast = document.getElementById('toast');
            toast.className = toast.className.replace('translate-y-20 opacity-0', 'translate-y-0 opacity-100');
            setTimeout(() => {
                toast.className = toast.className.replace('translate-y-0 opacity-100', 'translate-y-20 opacity-0');
            }, 3000);
        }

        // Logik Semak URL Hash (Auto Scroll & Blink apabila pautan dibuka/diklik)
        function handleHashAction() {
            const hash = window.location.hash;
            if (hash) {
                const targetId = hash.replace('#', '');
                const targetProgram = programData.find(p => p.id === targetId);
                
                if (targetProgram) {
                    // 1. Tukar filter secara automatik jika kad berada dalam kategori berbeza
                    if (currentFilter !== 'All' && currentFilter !== targetProgram.category) {
                        filterCategory(targetProgram.category);
                    }
                    
                    // 2. Tunggu seketika sehingga DOM selesai dibina semula, kemudian skrol dan blink
                    setTimeout(() => {
                        const targetCard = document.getElementById(targetId);
                        if (targetCard) {
                            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetCard.classList.add('blink-highlight');
                            // Buang kelas blink selepas animasi selesai supaya boleh di-trigger semula nanti
                            setTimeout(() => {
                                targetCard.classList.remove('blink-highlight');
                            }, 3000);
                        }
                    }, 200);
                }
            }
        }

        // Jalankan sewaktu halaman pertama kali dimuatkan
        window.addEventListener('DOMContentLoaded', () => {
            renderPrograms();
            handleHashAction();
        });

        // Pantau jika pengguna klik link yang ada hash berbeza pada halaman yang sama
        window.addEventListener('hashchange', handleHashAction);
    </script>
</body>
</html>
