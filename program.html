<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Hub | Fintech Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premiumDark: '#070A11',
                        premiumCard: '#111622',
                        premiumGold: '#D4AF37',
                        premiumAccent: '#1E2638',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #070A11; color: #E2E8F0; }

        /* Kesan Blink Highlight untuk kad yang dipilih */
        @keyframes blinkGold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); border-color: #1E2638; }
            50% { box-shadow: 0 0 25px 5px rgba(212, 175, 55, 0.4); border-color: #D4AF37; }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); border-color: #1E2638; }
        }
        .highlight-card { animation: blinkGold 1.5s ease-in-out 2; border-width: 2px !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #070A11; }
        ::-webkit-scrollbar-thumb { background: #1E2638; border-radius: 10px; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <header class="sticky top-0 z-40 bg-premiumDark/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-5 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2.5 rounded-xl bg-white/5 hover:bg-premiumGold hover:text-premiumDark transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-xl font-bold tracking-tight text-white uppercase">Program</h1>
            </div>
            <div class="hidden md:block">
                <span class="text-xs font-medium text-premiumGold tracking-widest uppercase">Eksklusif Ilmu Emas</span>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-5 mt-8">
        <div class="flex gap-3 overflow-x-auto pb-4 hide-scroll" id="filter-bar">
            <button onclick="filterCategory('All')" id="btn-All" class="cat-btn px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all border border-premiumGold bg-premiumGold text-premiumDark shadow-lg shadow-premiumGold/20">Semua</button>
            <button onclick="filterCategory('G100 Talk Show')" id="btn-G100" class="cat-btn px-6 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border border-white/10 bg-premiumAccent/50 text-gray-400">G100 Talk Show</button>
            <button onclick="filterCategory('QnA Public Gold')" id="btn-QnA" class="cat-btn px-6 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border border-white/10 bg-premiumAccent/50 text-gray-400">QnA Public Gold</button>
            <button onclick="filterCategory('Membina Rm1 Juta Pertama')" id="btn-Rm1" class="cat-btn px-6 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border border-white/10 bg-premiumAccent/50 text-gray-400">RM1 Juta Pertama</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-5 py-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="listing-container">
            </div>
    </main>

    <div id="modal-view" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-premiumDark/95 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="relative bg-premiumCard border border-white/10 w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 p-2 bg-premiumDark/50 rounded-full text-white hover:bg-red-500 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" />
                </svg>
            </button>
            
            <div class="md:w-1/2 bg-black flex items-center justify-center">
                <img id="modal-img" src="" alt="Poster" class="w-full h-auto object-contain max-h-[80vh]">
            </div>
            
            <div class="md:w-1/2 p-8 flex flex-col justify-center">
                <span id="modal-cat" class="text-xs font-bold text-premiumGold uppercase tracking-widest mb-4">Kategori</span>
                <h2 id="modal-title" class="text-3xl font-bold text-white mb-6 leading-tight">Tajuk Program</h2>
                <p id="modal-caption" class="text-gray-400 leading-relaxed mb-8">Keterangan program...</p>
                <div class="pt-6 border-t border-white/5">
                    <button onclick="closeModal()" class="w-full py-4 rounded-2xl bg-premiumAccent text-white font-bold hover:bg-premiumGold hover:text-premiumDark transition-all uppercase tracking-tighter">Tutup Paparan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-premiumGold text-premiumDark rounded-2xl font-bold text-sm shadow-2xl transition-all duration-500 translate-y-20 opacity-0 z-50">
        Pautan Berjaya Disalin!
    </div>

    <script src="js/program-data.js"></script>
    <script>
        let currentCategory = 'All';

        function renderPrograms() {
            const container = document.getElementById('listing-container');
            container.innerHTML = '';

            const filtered = currentCategory === 'All' 
                ? programData 
                : programData.filter(p => p.category === currentCategory);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.id = item.id;
                card.className = "group relative bg-premiumCard border border-white/5 rounded-[2rem] p-4 transition-all duration-500 hover:border-premiumGold/30";
                
                card.innerHTML = `
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-6">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://placehold.co/600x400/111622/D4AF37?text=Poster+Akan+Datang'">
                        <div class="absolute inset-0 bg-gradient-to-t from-premiumDark via-transparent opacity-60"></div>
                    </div>
                    
                    <div class="px-2">
                        <span class="text-[10px] font-extrabold text-premiumGold uppercase tracking-[0.2em] mb-2 block">${item.category}</span>
                        <h3 class="text-lg font-bold text-white mb-3 leading-snug min-h-[50px]">${item.title}</h3>
                        <p class="text-gray-500 text-sm line-clamp-2 mb-6 font-medium">${item.caption}</p>
                        
                        <div class="flex gap-3">
                            <button onclick="openModal('${item.id}')" class="flex-1 py-3.5 rounded-xl bg-premiumGold text-premiumDark font-bold text-xs uppercase tracking-tighter hover:bg-white transition-all">Lihat</button>
                            <button onclick="copyLink('${item.id}')" class="p-3.5 rounded-xl bg-premiumAccent text-white hover:bg-white/10 transition-all" title="Salin Pautan">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 002-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // FUNGSI MODAL (LIHAT)
        function openModal(id) {
            const data = programData.find(p => p.id === id);
            const modal = document.getElementById('modal-view');
            
            document.getElementById('modal-img').src = data.image;
            document.getElementById('modal-cat').innerText = data.category;
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-caption').innerText = data.caption;
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal-view');
            modal.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // FUNGSI COPY LINK & BLINK
        function copyLink(id) {
            const url = window.location.origin + window.location.pathname + '#' + id;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.replace('translate-y-20', 'translate-y-0');
                toast.classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.replace('translate-y-0', 'translate-y-20');
                    toast.classList.replace('opacity-100', 'opacity-0');
                }, 2500);
            });
        }

        function handleHash() {
            const hash = window.location.hash.substring(1);
            if(hash) {
                const target = document.getElementById(hash);
                if(target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    target.classList.add('highlight-card');
                    setTimeout(() => target.classList.remove('highlight-card'), 3500);
                }
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            
            // Update button styles
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-6 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border border-white/10 bg-premiumAccent/50 text-gray-400";
            });
            
            const activeId = cat === 'All' ? 'btn-All' : (cat === 'G100 Talk Show' ? 'btn-G100' : (cat === 'QnA Public Gold' ? 'btn-QnA' : 'btn-Rm1'));
            document.getElementById(activeId).className = "cat-btn px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all border border-premiumGold bg-premiumGold text-premiumDark shadow-lg shadow-premiumGold/20";
            
            renderPrograms();
        }

        window.onload = () => {
            renderPrograms();
            setTimeout(handleHash, 500);
        };
        window.onhashchange = handleHash;
    </script>
</body>
</html>
